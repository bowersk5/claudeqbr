<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NFL Passer Rating Calculator</title>
    <meta
      name="description"
      content="Calculate NFL passer rating from attempts, completions, yards, touchdowns, and interceptions."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;600&family=Bebas+Neue&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #0a0a0f;
        --panel: rgba(255, 255, 255, 0.03);
        --panel-border: rgba(255, 255, 255, 0.08);
        --text: #ffffff;
        --muted: rgba(255, 255, 255, 0.45);
        --muted-soft: rgba(255, 255, 255, 0.25);
        --accent: #1e88e5;
        --accent-dark: #1565c0;
        --accent-darker: #0d47a1;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        background-image:
          radial-gradient(ellipse 80% 50% at 50% -20%, #1a2a4a 0%, transparent 70%),
          repeating-linear-gradient(
            0deg,
            transparent,
            transparent 59px,
            rgba(255, 255, 255, 0.02) 60px
          ),
          repeating-linear-gradient(
            90deg,
            transparent,
            transparent 59px,
            rgba(255, 255, 255, 0.02) 60px
          );
        color: var(--text);
        font-family: "Bebas Neue", Impact, "Arial Black", sans-serif;
      }

      .app {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 40px 20px 60px;
      }

      .header {
        text-align: center;
        margin-bottom: 40px;
      }

      .eyebrow {
        font: 600 13px/1 "Barlow", sans-serif;
        letter-spacing: 6px;
        color: var(--accent);
        margin-bottom: 8px;
      }

      h1 {
        margin: 0;
        font-size: clamp(42px, 8vw, 76px);
        line-height: 0.9;
        letter-spacing: 4px;
        text-transform: uppercase;
      }

      h1 .accent {
        color: var(--accent);
      }

      .subhead,
      .footer-note {
        font-family: "Barlow", sans-serif;
        text-transform: uppercase;
      }

      .subhead {
        font-size: 13px;
        letter-spacing: 4px;
        color: rgba(255, 255, 255, 0.3);
        margin-top: 10px;
      }

      .card {
        width: 100%;
        max-width: 560px;
        background: var(--panel);
        border: 1px solid var(--panel-border);
        border-radius: 16px;
        padding: 32px 28px;
        backdrop-filter: blur(10px);
      }

      .fields {
        display: grid;
        gap: 14px;
      }

      .field-label {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 7px;
        font: 600 12px/1 "Barlow", sans-serif;
        letter-spacing: 3px;
        color: var(--muted);
        text-transform: uppercase;
      }

      .field-hint {
        margin-left: auto;
        font-size: 11px;
        letter-spacing: 1px;
        color: rgba(255, 255, 255, 0.2);
        font-weight: 400;
      }

      .field-input {
        width: 100%;
        padding: 14px 16px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 6px;
        background: rgba(255, 255, 255, 0.04);
        color: var(--text);
        font: 600 22px/1.2 "Barlow", sans-serif;
        letter-spacing: 1px;
        outline: none;
        transition:
          border-color 0.2s,
          background 0.2s,
          box-shadow 0.2s;
      }

      .field-input:focus {
        border-color: rgba(0, 180, 255, 0.6);
        background: rgba(0, 180, 255, 0.06);
        box-shadow: 0 0 0 3px rgba(0, 180, 255, 0.1);
      }

      .field-input::placeholder {
        color: rgba(255, 255, 255, 0.2);
      }

      .actions {
        display: flex;
        gap: 12px;
        align-items: center;
        margin-top: 28px;
      }

      button {
        cursor: pointer;
      }

      .calc-btn {
        flex: 1;
        border: 0;
        border-radius: 8px;
        padding: 18px 60px;
        background: linear-gradient(135deg, var(--accent-dark), var(--accent-darker));
        color: var(--text);
        font-family: "Bebas Neue", sans-serif;
        font-size: 26px;
        letter-spacing: 3px;
        box-shadow:
          0 4px 20px rgba(21, 101, 192, 0.5),
          inset 0 1px 0 rgba(255, 255, 255, 0.15);
        transition:
          transform 0.1s,
          box-shadow 0.2s;
      }

      .calc-btn:hover {
        transform: translateY(-2px);
        box-shadow:
          0 8px 30px rgba(21, 101, 192, 0.7),
          inset 0 1px 0 rgba(255, 255, 255, 0.15);
      }

      .calc-btn:active {
        transform: translateY(0);
      }

      .reset-btn {
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 8px;
        padding: 10px 28px;
        background: transparent;
        color: rgba(255, 255, 255, 0.4);
        font: 13px/1 "Barlow", sans-serif;
        letter-spacing: 2px;
        text-transform: uppercase;
        transition: all 0.2s;
      }

      .reset-btn:hover {
        border-color: rgba(255, 255, 255, 0.5);
        color: rgba(255, 255, 255, 0.7);
      }

      .result {
        width: 100%;
        max-width: 560px;
        margin-top: 28px;
        padding: 32px 28px;
        border-radius: 16px;
        text-align: center;
        background: var(--panel);
        display: none;
      }

      .result.visible {
        display: block;
      }

      .result-label {
        margin-bottom: 12px;
        font: 600 12px/1 "Barlow", sans-serif;
        letter-spacing: 5px;
        color: rgba(255, 255, 255, 0.4);
        text-transform: uppercase;
      }

      .score-wrap {
        opacity: 0;
      }

      .score-wrap.score-animate {
        animation: scoreReveal 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
      }

      .score-value {
        font-size: clamp(72px, 15vw, 110px);
        line-height: 1;
        letter-spacing: -2px;
      }

      .score-status {
        margin-top: 4px;
        font-size: clamp(22px, 5vw, 34px);
        letter-spacing: 6px;
        opacity: 0.85;
      }

      .perfect-glow {
        animation: flashGlow 1.2s ease-in-out infinite;
      }

      .progress {
        margin-top: 24px;
        position: relative;
      }

      .track {
        height: 6px;
        border-radius: 99px;
        overflow: hidden;
        background: rgba(255, 255, 255, 0.07);
      }

      .fill {
        height: 100%;
        width: 0;
        border-radius: 99px;
      }

      .fill.bar-animate {
        animation: barFill 0.8s cubic-bezier(0.22, 1, 0.36, 1) forwards;
      }

      .scale {
        display: flex;
        justify-content: space-between;
        margin-top: 6px;
        color: var(--muted-soft);
        font: 11px/1 "Barlow", sans-serif;
        letter-spacing: 1px;
      }

      .breakdown {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        margin-top: 24px;
      }

      .metric {
        padding: 12px 16px;
        border: 1px solid rgba(255, 255, 255, 0.07);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.03);
        text-align: left;
      }

      .metric-label {
        margin-bottom: 4px;
        color: rgba(255, 255, 255, 0.35);
        font: 11px/1 "Barlow", sans-serif;
        letter-spacing: 2px;
        text-transform: uppercase;
      }

      .metric-value {
        font-size: 22px;
        letter-spacing: 1px;
      }

      .footer-note {
        margin-top: 32px;
        font-size: 12px;
        letter-spacing: 2px;
        color: rgba(255, 255, 255, 0.2);
        text-align: center;
      }

      @keyframes scoreReveal {
        0% {
          opacity: 0;
          transform: scale(0.6) translateY(20px);
        }
        60% {
          transform: scale(1.08) translateY(-4px);
        }
        100% {
          opacity: 1;
          transform: scale(1) translateY(0);
        }
      }

      @keyframes barFill {
        from {
          width: 0;
        }
        to {
          width: var(--target-width);
        }
      }

      @keyframes flashGlow {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.4;
        }
      }

      @media (max-width: 640px) {
        .card,
        .result {
          padding: 24px 18px;
        }

        .field-label {
          align-items: flex-start;
          flex-wrap: wrap;
        }

        .field-hint {
          width: 100%;
          margin-left: 0;
          margin-top: 4px;
        }

        .actions {
          flex-direction: column;
        }

        .calc-btn,
        .reset-btn {
          width: 100%;
        }

        .breakdown {
          grid-template-columns: 1fr;
        }

        .scale {
          gap: 8px;
          font-size: 10px;
        }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <header class="header">
        <div class="eyebrow">NFL OFFICIAL</div>
        <h1>PASSER<br /><span class="accent">RATING</span></h1>
        <div class="subhead">Calculator</div>
      </header>

      <section class="card">
        <div class="fields">
          <div>
            <label class="field-label" for="att"><span>🏈</span>ATTEMPTS <span class="field-hint">Pass attempts</span></label>
            <input class="field-input" id="att" name="att" type="number" min="0" placeholder="0" />
          </div>
          <div>
            <label class="field-label" for="comp"><span>✅</span>COMPLETIONS <span class="field-hint">Completed passes</span></label>
            <input class="field-input" id="comp" name="comp" type="number" min="0" placeholder="0" />
          </div>
          <div>
            <label class="field-label" for="yards"><span>📏</span>PASS YARDS <span class="field-hint">Total passing yards</span></label>
            <input class="field-input" id="yards" name="yards" type="number" min="0" placeholder="0" />
          </div>
          <div>
            <label class="field-label" for="td"><span>🙌</span>TOUCHDOWNS <span class="field-hint">TD passes</span></label>
            <input class="field-input" id="td" name="td" type="number" min="0" placeholder="0" />
          </div>
          <div>
            <label class="field-label" for="int"><span>🚫</span>INTERCEPTIONS <span class="field-hint">Interceptions thrown</span></label>
            <input class="field-input" id="int" name="int" type="number" min="0" placeholder="0" />
          </div>
        </div>

        <div class="actions">
          <button class="calc-btn" id="calc-btn" type="button">CALCULATE</button>
          <button class="reset-btn" id="reset-btn" type="button">RESET</button>
        </div>
      </section>

      <section class="result" id="result">
        <div class="result-label">Passer Rating</div>
        <div class="score-wrap" id="score-wrap">
          <div class="score-value" id="score-value"></div>
          <div class="score-status" id="score-status"></div>
        </div>

        <div class="progress">
          <div class="track">
            <div class="fill" id="progress-fill"></div>
          </div>
          <div class="scale">
            <span>0</span>
            <span>79 AVG</span>
            <span>100 GOOD</span>
            <span>158.3 MAX</span>
          </div>
        </div>

        <div class="breakdown">
          <div class="metric">
            <div class="metric-label">Completion %</div>
            <div class="metric-value" id="metric-comp"></div>
          </div>
          <div class="metric">
            <div class="metric-label">Yards/Attempt</div>
            <div class="metric-value" id="metric-yards"></div>
          </div>
          <div class="metric">
            <div class="metric-label">TD Rate</div>
            <div class="metric-value" id="metric-td"></div>
          </div>
          <div class="metric">
            <div class="metric-label">INT Rate</div>
            <div class="metric-value" id="metric-int"></div>
          </div>
        </div>
      </section>

      <div class="footer-note">Formula per NFL Official Rules · Max Rating 158.3</div>
    </main>

    <script>
      const clamp = (value, min, max) => Math.min(Math.max(value, min), max);

      function calcRating(stats) {
        if (!stats.att) {
          return null;
        }

        const a = clamp((stats.comp / stats.att - 0.3) * 5, 0, 2.375);
        const b = clamp((stats.yards / stats.att - 3) * 0.25, 0, 2.375);
        const c = clamp((stats.td / stats.att) * 20, 0, 2.375);
        const d = clamp(2.375 - (stats.int / stats.att) * 25, 0, 2.375);
        return ((a + b + c + d) / 6) * 100;
      }

      function getRatingLabel(rating) {
        if (rating === null) return { label: "—", color: "#888" };
        if (rating >= 158.3) return { label: "PERFECT", color: "#FFD700" };
        if (rating >= 120) return { label: "ELITE", color: "#00E5FF" };
        if (rating >= 100) return { label: "GREAT", color: "#69FF47" };
        if (rating >= 85) return { label: "GOOD", color: "#B2FF59" };
        if (rating >= 70) return { label: "AVERAGE", color: "#FFCA28" };
        if (rating >= 50) return { label: "POOR", color: "#FF7043" };
        return { label: "AWFUL", color: "#FF1744" };
      }

      const ids = ["att", "comp", "yards", "td", "int"];
      const inputs = Object.fromEntries(ids.map((id) => [id, document.getElementById(id)]));

      const result = document.getElementById("result");
      const scoreWrap = document.getElementById("score-wrap");
      const scoreValue = document.getElementById("score-value");
      const scoreStatus = document.getElementById("score-status");
      const progressFill = document.getElementById("progress-fill");
      const metricComp = document.getElementById("metric-comp");
      const metricYards = document.getElementById("metric-yards");
      const metricTd = document.getElementById("metric-td");
      const metricInt = document.getElementById("metric-int");

      function parseStats() {
        return ids.reduce((acc, id) => {
          acc[id] = parseFloat(inputs[id].value) || 0;
          return acc;
        }, {});
      }

      function renderMetrics(stats) {
        if (!stats.att) {
          metricComp.textContent = "—";
          metricYards.textContent = "—";
          metricTd.textContent = "—";
          metricInt.textContent = "—";
          return;
        }

        metricComp.textContent = ((stats.comp / stats.att) * 100).toFixed(1) + "%";
        metricYards.textContent = (stats.yards / stats.att).toFixed(2);
        metricTd.textContent = ((stats.td / stats.att) * 100).toFixed(1) + "%";
        metricInt.textContent = ((stats.int / stats.att) * 100).toFixed(1) + "%";
      }

      function triggerAnimation(width) {
        scoreWrap.classList.remove("score-animate");
        progressFill.classList.remove("bar-animate");
        void scoreWrap.offsetWidth;
        progressFill.style.setProperty("--target-width", width);
        scoreWrap.classList.add("score-animate");
        progressFill.classList.add("bar-animate");
      }

      document.getElementById("calc-btn").addEventListener("click", () => {
        const stats = parseStats();
        const rating = calcRating(stats);

        if (rating === null) {
          result.classList.remove("visible");
          return;
        }

        const meta = getRatingLabel(rating);
        const percent = Math.min((rating / 158.3) * 100, 100).toFixed(2) + "%";

        result.classList.add("visible");
        result.style.border = "1px solid " + meta.color + "33";
        result.style.boxShadow = "0 0 60px " + meta.color + "15";

        scoreValue.textContent = rating.toFixed(1);
        scoreValue.style.color = meta.color;
        scoreValue.style.textShadow = "0 0 40px " + meta.color + "60";

        scoreStatus.textContent = meta.label;
        scoreStatus.style.color = meta.color;
        scoreStatus.classList.toggle("perfect-glow", meta.label === "PERFECT");

        progressFill.style.background =
          "linear-gradient(90deg, var(--accent-dark), " + meta.color + ")";
        renderMetrics(stats);
        triggerAnimation(percent);
      });

      document.getElementById("reset-btn").addEventListener("click", () => {
        ids.forEach((id) => {
          inputs[id].value = "";
        });

        result.classList.remove("visible");
        scoreWrap.classList.remove("score-animate");
        progressFill.classList.remove("bar-animate");
      });
    </script>
  </body>
</html>
